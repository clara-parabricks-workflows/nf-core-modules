name: parabricks_rnafq2bam
description: This tool is the equivalent of fq2bam for RNA-Seq samples,
  receiving inputs in FASTQ format, performing alignment with the splice-aware
  STAR algorithm, optionally marking of duplicate reads, and outputting an
  aligned BAM file ready for variant and fusion calling.
keywords:
  - align
  - star
  - rna
tools:
  - "parabricks":
      description: "NVIDIA Clara Parabricks GPU-accelerated genomics tools"
      homepage: "https://www.nvidia.com/en-us/clara/genomics/"
      documentation: "https://docs.nvidia.com/clara/parabricks/latest/index.html"
      licence: ["https://docs.nvidia.com/clara/parabricks/latest/eula.html"]
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - reads:
        type: file
        description: fastq.gz files
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
          - edam: http://edamontology.org/format_1930 # FASTQ
  - - meta1:
        type: map
        description: |
          Groovy Map containing fasta information
    - fasta:
        type: file
        description: reference fasta file - must be unzipped
        pattern: "*.fasta"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
  - - meta2:
        type: map
        description: |
          Groovy Map containing index information
    - index:
        type: file
        description: reference BWA index
        pattern: "*.{amb,ann,bwt,pac,sa}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing genome lib dir information
    - genome_lib_dir:
        type: directory
        description: Path to a genome resource library directory. The indexing
          required to run STAR should be completed by the user beforehand.
        pattern: "*"
        ontologies: []
output:
  - log_final:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*Log.final.out":
          type: file
          description: STAR final log file
          pattern: "*Log.final.out"
  - log_out:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*Log.out":
          type: file
          description: STAR lot out file
          pattern: "*Log.out"
  - log_progress:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*Log.progress.out":
          type: file
          description: STAR log progress file
          pattern: "*Log.progress.out"
  - versions:
      - versions.yml:
          type: file
          description: File containing software versions
          pattern: "versions.yml"
  - bam:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*d.out.bam":
          type: file
          description: Output BAM file containing read alignments
          pattern: "*.{bam}"
  - bam_sorted:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.sortedByCoord.out.bam:
          type: file
          description: Sorted BAM file of read alignments (optional)
          pattern: "*sortedByCoord.out.bam"
  - bam_sorted_aligned:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.Aligned.sortedByCoord.out.bam:
          type: file
          description: Sorted BAM file of read alignments (optional)
          pattern: "*.Aligned.sortedByCoord.out.bam"
  - bam_transcript:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*toTranscriptome.out.bam":
          type: file
          description: Output BAM file of transcriptome alignment (optional)
          pattern: "*toTranscriptome.out.bam"
  - bam_unsorted:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*Aligned.unsort.out.bam":
          type: file
          description: Unsorted BAM file of read alignments (optional)
          pattern: "*Aligned.unsort.out.bam"
  - fastq:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*fastq.gz":
          type: file
          description: Unmapped FastQ files (optional)
          pattern: "*fastq.gz"
  - tab:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tab":
          type: file
          description: STAR output tab file(s) (optional)
          pattern: "*.tab"
  - spl_junc_tab:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.SJ.out.tab":
          type: file
          description: STAR output splice junction tab file
          pattern: "*.SJ.out.tab"
  - read_per_gene_tab:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.ReadsPerGene.out.tab":
          type: file
          description: STAR output read per gene tab file
          pattern: "*.ReadsPerGene.out.tab"
  - junction:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.out.junction":
          type: file
          description: STAR chimeric junction output file (optional)
          pattern: "*.out.junction"
  - sam:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
          pattern: "*.out.sam"
      - "*.out.sam":
          type: file
          description: STAR output SAM file(s) (optional)
          pattern: "*.out.sam"
  - wig:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.wig":
          type: file
          description: STAR output wiggle format file(s) (optional)
          pattern: "*.wig"
  - bedgraph:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.bg":
          type: file
          description: STAR output bedGraph format file(s) (optional)
          pattern: "*.bg"
authors:
  - "@gburnett-nvidia"
maintainers:
  - "@gburnett-nvidia"
